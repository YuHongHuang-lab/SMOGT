log:
    level: "INFO"

dataset:
    # Data root directory, storing all project files
    data_root: "/mnt/data/home/tycloud/workspace/algorithms_raw_paper_4/data/HSPC/"
    # Raw data directory, containing graph_0_node_names.csv, graph_0_nodes.csv, and graph_0_edges.csv
    raw_dir: "/mnt/data/home/tycloud/workspace/algorithms_raw_paper_4/data/HSPC/raw_600/"
    # Processed data, temporary data, images
    processed_dir: "/mnt/data/home/tycloud/workspace/algorithms_raw_paper_4/data/HSPC/processed/"

    # The prefix for the negative edge sample set,
    # which needs to be generated by running generate_negative_data.py,
    # is by default placed in the processed_dir
    edge_neg: "data_list_hetero"

    # Calculate the gene-peak correlation coefficient matrix.
    # If the orig_file is not provided, it will be calculated automatically
    orige_file: null  # Here it needs to be explicitly set to null instead of left blank

    # Whether to rebuild the BioDataset object each time it runs
    force_reload: false

    # Whether there are multiple graphs (e.g., time series).
    # Default is a single graph. If there are multiple graphs, whether each graph has labels.
    num_graphs: 1
    use_graph_labels: false

    # If set to false, ID names will be automatically generated
    use_node_name: true



    # Node label column name
    node_label_column: null

    # Edge-related configurations
    edge_timestamp_column: null
    edge_type_column: null
    edge_label_column: null

    # Two columns (the last two columns of graph_0_edges.csv)
    # edge_id_HC: Regulatory relationships with correlation coefficients greater than a specific threshold
    # edge_id_T: Regulatory relationships validated in specific datasets.
    # However, if no prior relationships exist, it is more common to directly replace edge_id_T with edge_id_HC
    # This approach facilitates the subsequent calculation of regulatory relationship prediction metrics, such as AUPR and AUC
    edge_feature_column: "edge_id_HC, edge_id_T"


    merge_graphs: true
    seed: 42
    # The ratio for randomly splitting the prior network into training and testing sets
    # In the subsequent split_edges function, if use_last_col is set to True, the split will be performed
    # If use_last_col is set to False, the edge_id_HC column will serve as the training set, and the edge_id_T column will serve as the testing set
    rate: 0.2
    ncores: 10

    # Prior network correlation calculation.
    # This part of the parameters and their corresponding code have been deprecated
    # as it has already been performed during the data preprocessing stage (refer to data_preprocess.R)
    global_network_method: 'pearson'
    cor_threshold: 0.05
    CRE_CRE: 0.001
    threshold_m: 'percent'
    mask_prior: false
    reverse: false
    k_fold: 5

# Model parameters
model:
    # If the model has only two layers, the first layer is hidden, and the second layer is embedding
    hidden_dim: 32
    embedding_dim: 16
    # The ratio of negative edge samples to edges in the training set per training iteration
    Negative_rate: 1

    # If the model has more than two layers,
    # the first two layers remain hidden and embedding,
    # and the dimensions of subsequent layers are the same as the embedding layer
    num_layers: 4
    dropout: 0.1

    # The combined loss of expression profile reconstruction and edge prediction,
    # with the sum of their weights equal to 1
    edge_loss_rate: 0.999

    # The proportion of different edge types in the loss function
    edge_type_weights:
        CRE-CRE: 0.5
        TF-CRE: 0.5

# Attention parameter settings
attention:
    # Number of attention heads
    heads: 1
    # Whether to retain only the TOP_K edges with the highest attention scores
    top_k_type: 'globel'
    top_k: -1
    hop_num: 4

# Training parameters
training:
    # Batch size setting. It can only be set to 1 because this model incorporates all edges into training at once
    batch_size: 1
    # Whether to shuffle the order of edges during each training session
    shuffle: false
    # Number of training epochs
    epochs: 1000
    learning_rate: 0.001
    weight_decay: 0

    # Training stopping condition.
    # Since both expression profile reconstruction and edge prediction are involved,
    # they may conflict as training progresses to a certain stage.
    # Therefore, to preserve the maximum effectiveness of edge prediction,
    # this model sets an early stopping condition based on the edge prediction performance.

    # During each training epoch, there are multiple steps (idx).
    # This sets the maximum number of steps to run in one epoch
    idx_limit: 500
    # Maximum number of training epochs
    epoch_limit: 0
    # Minimum number of training epochs
    epoch_cut: 0

    # Early stopping criterion for expression profile reconstruction: mean Pearson correlation distance
    cor_limit: 0.15

    # Early stopping criterion for edge prediction during each negative sampling: average value
    auc_limit: 0.78
    aupr_limit: 0.7

    # Early stopping criterion for specific edge predictions during each negative sampling: average value
    auc_TF_CRE_limit: 0.7
    auc_CRE_CRE_limit: 0.7,

    # Early stopping criterion for edge prediction on regulatory relationships recorded in the ground truth (edge_id_T column): average value
    mean_aupr_limit: 0.3
    neg_epoch_limit: 3

# Set early stopping conditions for TF-CRE
tf_metrics:
    # Estimate the mean_aupr_limit for TF-CRE at every few idx steps (interval) within the same epoch
    interval: 5
    # Only TFs with the number of retained edges greater than min_positive_edges are included in the evaluation
    min_positive_edges: 200